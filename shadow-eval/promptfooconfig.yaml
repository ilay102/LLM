# Promptfoo: pairwise (baseline vs gateway) with an LLM judge.
#
# The trick: we register TWO providers (baseline + gateway), use the same
# prompt template for both, then attach an `llm-rubric` assert that runs the
# pairwise judge across the two outputs of each test case.
#
# Run:   promptfoo eval -c promptfooconfig.yaml
# View:  promptfoo view

description: "Shadow eval — Baseline (direct Sonnet) vs Gateway (routed)"

prompts:
  - "{{prompt}}"   # the test case provides {{prompt}}; system prompts can be added per-case via vars

providers:
  # ---------- BASELINE: what the client uses today ----------
  - id: baseline
    label: "Baseline (Sonnet 4.6 direct)"
    provider:
      id: anthropic:messages:claude-sonnet-4-6
      config:
        max_tokens: 1024
        temperature: 0.2

  # ---------- SHADOW: routed through OUR gateway ----------
  # Gateway is OpenAI-compatible -> use openai provider with custom base URL.
  - id: shadow
    label: "Shadow (MSP Gateway)"
    provider:
      id: openai:chat:auto    # "auto" tells the gateway: classify and route
      config:
        apiBaseUrl: "${GATEWAY_URL}"
        apiKey: "${GATEWAY_KEY}"
        max_tokens: 1024
        temperature: 0.2
        # Capture the model the gateway actually picked (it surfaces in resp.model)

# Pull the test cases generated by capture_traffic.py
tests: file://dataset.jsonl

# ---------- The judge ----------
# We use Promptfoo's built-in pairwise comparison ("model-graded-closedqa" with
# our custom rubric). The judge sees BOTH outputs randomized and emits A/B/TIE.
defaultTest:
  options:
    # Custom grader: forces our pairwise prompt + Sonnet 4.6 as judge
    provider: anthropic:messages:claude-sonnet-4-6
  assert:
    - type: llm-rubric
      provider: anthropic:messages:claude-sonnet-4-6
      rubricPrompt: file://judge_prompt.txt
      # We invoke the rubric on the SHADOW provider's output, comparing to
      # baseline via the {{vars._conversation}} machinery. See generate_report.py
      # for the post-hoc pairwise aggregation we ALSO run, which is what the
      # CTO report uses (more rigorous than per-row rubric).

# How outputs are scored:
#   - llm-rubric returns pass/fail per row (shadow vs an absolute rubric)
#   - generate_report.py runs the TRUE pairwise judge across baseline+shadow
#     pairs and produces the win/tie/loss aggregate. This double-system gives
#     you both per-row signal AND a defensible aggregate metric.

outputPath: results.json

# Sharing settings — keep results local; CTO reports go through generate_report.py
sharing: false
